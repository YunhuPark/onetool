<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>할인율 계산기</title>
    <style>
        :root {
            --bg: #101010;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #0095f6;
            --gray: #888;
            --save: #4caf50;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--gray);
            font-weight: normal;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .chip {
            background: #333;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .chip:active {
            transform: scale(0.95);
        }

        .chip.active-mode {
            background: var(--accent);
        }

        .result-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .final-price {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .final-price span {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray);
        }

        .saved-amount {
            color: var(--accent);
            font-size: 16px;
            font-weight: 600;
            background: rgba(0, 149, 246, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            flex: 1;
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: 600;
            outline: none;
            padding: 0;
        }

        /* 스피너 제거 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .presets {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-top: 10px;
        }

        .preset-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 14px;
            cursor: pointer;
        }

        .preset-btn:active {
            background: var(--accent);
        }

        /* 뒤로가기 버튼 스타일 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            font-size: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn">←</a>

    <div class="container">
        <h1>할인율 계산기</h1>

        <div class="mode-tabs">
            <button class="chip active-mode" onclick="setMode('normal', this)">일반 할인</button>
            <button class="chip" onclick="setMode('1plus1', this)">1+1 마트</button>
            <button class="chip" onclick="setMode('2plus1', this)">2+1 편의점</button>
        </div>

        <div class="result-box">
            <div class="final-price" id="final">0<span>원</span></div>
            <div class="saved-amount" id="saved">0원 아꼈어요!</div>
        </div>

        <div class="input-wrapper">
            <div class="input-group" style="flex: 2;">
                <label id="priceLabel">원래 가격</label>
                <input type="number" id="price" placeholder="0" inputmode="numeric">
            </div>
            <div class="input-group" id="rateGroup" style="flex: 1;">
                <label>할인율 (%)</label>
                <input type="number" id="rate" placeholder="0" inputmode="numeric">
            </div>
        </div>

        <div class="presets" id="presets">
            <button class="preset-btn" onclick="setRate(10)">10%</button>
            <button class="preset-btn" onclick="setRate(20)">20%</button>
            <button class="preset-btn" onclick="setRate(30)">30%</button>
            <button class="preset-btn" onclick="setRate(50)">50%</button>
            <button class="preset-btn" onclick="setRate(70)">70%</button>
        </div>
    </div>

    <script>
        const priceInput = document.getElementById('price');
        const rateInput = document.getElementById('rate');
        const finalEl = document.getElementById('final');
        const savedEl = document.getElementById('saved');
        let currentMode = 'normal';

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-tabs .chip').forEach(c => c.classList.remove('active-mode'));
            btn.classList.add('active-mode');

            const rateGroup = document.getElementById('rateGroup');
            const presets = document.getElementById('presets');
            const priceLabel = document.getElementById('priceLabel');

            if (mode === 'normal') {
                rateGroup.style.display = 'block';
                presets.style.display = 'flex';
                priceLabel.innerText = '원래 가격';
            } else {
                rateGroup.style.display = 'none';
                presets.style.display = 'none';
                priceLabel.innerText = '1개 가격 (행사가)';
            }
            calculate();
        }

        function calculate() {
            const price = parseFloat(priceInput.value) || 0;

            if (currentMode === 'normal') {
                const rate = parseFloat(rateInput.value) || 0;
                const saved = price * (rate / 100);
                const final = price - saved;

                finalEl.innerHTML = `${formatNumber(Math.floor(final))}<span>원</span>`;
                savedEl.innerText = `${formatNumber(Math.floor(saved))}원 아꼈어요!`;
                savedEl.style.background = 'rgba(0, 149, 246, 0.1)';
                savedEl.style.color = 'var(--accent)';
            } else if (currentMode === '1plus1') {
                const final = price / 2;
                finalEl.innerHTML = `개당 ${formatNumber(Math.floor(final))}<span>원</span>`;
                savedEl.innerText = `실제 할인율: 50%`;
                savedEl.style.background = 'rgba(76, 175, 80, 0.1)';
                savedEl.style.color = '#4caf50';
            } else if (currentMode === '2plus1') {
                const final = (price * 2) / 3;
                finalEl.innerHTML = `개당 ${formatNumber(Math.floor(final))}<span>원</span>`;
                savedEl.innerText = `실제 할인율: 약 33.3%`;
                savedEl.style.background = 'rgba(76, 175, 80, 0.1)';
                savedEl.style.color = '#4caf50';
            }
        }

        function setRate(val) {
            rateInput.value = val;
            calculate();
        }

        priceInput.addEventListener('input', calculate);
        rateInput.addEventListener('input', calculate);
    </script>
</body>

</html>
